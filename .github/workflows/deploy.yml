name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAUK8H7SXkLwmagmceSi1Ta3G_8p0RWzXU
          VITE_FIREBASE_AUTH_DOMAIN: help-desk-lite.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: help-desk-lite
          VITE_FIREBASE_STORAGE_BUCKET: help-desk-lite.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 837842550235
          VITE_FIREBASE_APP_ID: 1:837842550235:web:edbcdf8e8c5683007f3bfe

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
